version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: trialbridge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trialbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: trialbridge-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trialbridge
      - CACHE_TTL=60
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: trialbridge-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
